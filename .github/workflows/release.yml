name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rs-summarizer
            asset_name: rs-summarizer-linux-amd64
            package_name: rs-summarizer
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: viz-tool
            asset_name: viz-tool-linux-amd64
            package_name: viz-tool
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rs-summarizer
            asset_name: rs-summarizer-macos-amd64
            package_name: rs-summarizer
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: viz-tool
            asset_name: viz-tool-macos-amd64
            package_name: viz-tool
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rs-summarizer
            asset_name: rs-summarizer-macos-arm64
            package_name: rs-summarizer
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: viz-tool
            asset_name: viz-tool-macos-arm64
            package_name: viz-tool

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.package_name }}

      - name: Package asset
        shell: bash
        run: |
          # Create a staging directory with the binary and required runtime files
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          
          # Add static files only for rs-summarizer (web app needs them, viz-tool doesn't)
          if [ "${{ matrix.package_name }}" = "rs-summarizer" ]; then
            cp -r static staging/
          fi
          
          tar czf "${{ matrix.asset_name }}.tar.gz" -C staging .

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
