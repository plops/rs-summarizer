name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Temporarily disable macOS builds until Linux is working reliably
          # - os: macos-latest
          #   target: x86_64-apple-darwin
          # - os: macos-latest
          #   target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure third_party/fast-umap exists
        run: |
          set -euo pipefail
          if [ ! -f third_party/fast-umap/Cargo.toml ]; then
            echo "third_party/fast-umap/Cargo.toml not found — cloning upstream fast-umap into third_party/fast-umap"
            mkdir -p third_party
            git clone --depth 1 https://github.com/eugenehp/fast-map.git third_party/fast-umap
          else
            echo "third_party/fast-umap present"
          fi

      - name: Apply third_party patches
        env:
          SKIP_COMMIT: "1"
        run: |
          chmod +x ./scripts/apply_submodule_patches.sh
          ./scripts/apply_submodule_patches.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package assets
        shell: bash
        run: |
          set -euo pipefail
          echo "Packaging rs-summarizer-${{ matrix.target }}..."
          mkdir -p staging

          # Helper function: copy a binary from possible cargo target locations
          copy_bin() {
            bin="$1"
            paths=(
              "target/${{ matrix.target }}/release/${bin}"
              "target/release/${bin}"
            )
            for p in "${paths[@]}"; do
              if [ -f "$p" ]; then
                echo "Copying $p -> staging/"
                cp "$p" staging/
                return 0
              fi
            done
            return 1
          }

          # rs-summarizer is required
          if ! copy_bin rs-summarizer; then
            echo "Error: rs-summarizer binary not found in target dirs. Build may have failed."
            ls -la target || true
            exit 1
          fi

          # viz-tool is optional for packaging; copy if present
          if ! copy_bin viz-tool; then
            echo "Note: viz-tool binary not found; continuing without it."
          fi

          # Copy static files for web app if present
          if [ -d static ]; then
            cp -r static staging/
          fi

          # Create platform-specific asset name
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)
              tar_name="rs-summarizer-linux-amd64.tar.gz"
              ;;
            x86_64-apple-darwin)
              tar_name="rs-summarizer-macos-amd64.tar.gz"
              ;;
            aarch64-apple-darwin)
              tar_name="rs-summarizer-macos-arm64.tar.gz"
              ;;
            *)
              tar_name="rs-summarizer-${{ matrix.target }}.tar.gz"
              ;;
          esac

          echo "Creating archive $tar_name"
          tar czf "$tar_name" -C staging .

          # Clean up staging directory
          rm -rf staging

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            rs-summarizer-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
