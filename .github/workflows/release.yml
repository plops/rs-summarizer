name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package assets
        shell: bash
        run: |
          # Create single tarball per architecture containing both binaries
          echo "Packaging rs-summarizer-${{ matrix.target }}..."
          mkdir -p staging
          
          # Copy both binaries
          cp target/${{ matrix.target }}/release/rs-summarizer staging/
          cp target/${{ matrix.target }}/release/viz-tool staging/
          
          # Copy static files for web app
          cp -r static staging/
          
          # Create platform-specific asset name
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)
              tar czf rs-summarizer-linux-amd64.tar.gz -C staging .
              ;;
            x86_64-apple-darwin)
              tar czf rs-summarizer-macos-amd64.tar.gz -C staging .
              ;;
            aarch64-apple-darwin)
              tar czf rs-summarizer-macos-arm64.tar.gz -C staging .
              ;;
          esac
          
          # Clean up staging directory
          rm -rf staging

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            rs-summarizer-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
