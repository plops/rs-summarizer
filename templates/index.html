<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rs-summarizer</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <main class="container">
        <h1>YouTube Transcript Summarizer</h1>
        <form hx-post="/process_transcript" hx-target="#result" hx-swap="innerHTML">
            <label for="url">YouTube URL</label>
            <input type="text" id="url" name="original_source_link" placeholder="https://www.youtube.com/watch?v=..." required>
            
            <label for="model">Model</label>
            <select id="model" name="model">
                {% for model in models %}
                <option value="{{ model.name }}">{{ model.name }}</option>
                {% endfor %}
            </select>
            
            <button type="submit">Summarize</button>
        </form>
        
        <div id="result"></div>
        
        <hr>
        <nav>
            <a href="/browse">Browse Summaries</a> |
            <form hx-post="/search" hx-target="#search-results" hx-swap="innerHTML" style="display:inline">
                <input type="text" name="query" placeholder="Search summaries..." style="display:inline;width:auto">
                <button type="submit">Search</button>
            </form>
        </nav>
        <div id="search-results"></div>
    </main>
</body>
</html>
