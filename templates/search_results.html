{% if results.is_empty() %}
<p>No results found.</p>
{% else %}
<h3>Search Results</h3>
{% for (score, item) in results %}
<article>
    <header>
        <strong>#{{ item.identifier }}</strong> — {{ item.model }}
        <small>(similarity: {{ "{:.3}"|format(score) }})</small>
    </header>
    <p>{{ item.summary|truncate(200) }}</p>
</article>
{% endfor %}
{% endif %}
